name: Build and Release Deb

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    name: Check version vs. tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and check for existing tag
        id: version
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^version = /{print $2; exit}' Cargo.toml)
          if [ -z "${version}" ]; then
            echo "::error::Could not parse version from Cargo.toml"
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::notice::workflow_dispatch run; will build but not release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::notice::Tag ${tag} already exists; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No tag ${tag} yet; will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build deb (${{ matrix.target }})
    needs: check-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cross-compilation toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build deb package
        run: |
          cargo deb \
            --no-build \
            --target ${{ matrix.target }} \
            --output target/${{ matrix.target }}/debian/

      - name: Locate deb artifact
        id: deb
        run: |
          deb_path=$(ls target/${{ matrix.target }}/debian/*.deb | head -n 1)
          echo "path=${deb_path}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${deb_path}")" >> "$GITHUB_OUTPUT"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.deb.outputs.name }}
          path: ${{ steps.deb.outputs.path }}
          if-no-files-found: error

  release:
    name: Tag and publish release
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts

      - name: Create and push tag
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" "${SHA}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: artifacts/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(needs.check-version.outputs.tag, '-') }}
